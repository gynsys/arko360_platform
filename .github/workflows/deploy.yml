name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
            tag: backend
            lint: false
          - name: landing
            context: ./landing
            tag: landing-frontend
            lint: true
          - name: admin
            context: ./admin
            tag: admin-frontend
            lint: true
          - name: super-admin-frontend
            context: ./super-admin-frontend
            tag: super-admin-frontend
            lint: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.service.lint
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service.context }}/package-lock.json'

      - name: Inject Production Environment Variables
        if: matrix.service.lint
        run: |
          echo "VITE_API_URL=/api/v1" > ${{ matrix.service.context }}/.env.production

      - name: Run ESLint
        if: matrix.service.lint
        working-directory: ${{ matrix.service.context }}
        run: |
          npm ci || npm install
          npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.tag }}:latest
          cache-from: type=gha,scope=${{ matrix.service.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.172.115.154
          username: root
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd /var/www/arko360_platform
            
            # Login to GitHub Container Registry using the GitHub token
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull new code (specifically to get the latest docker-compose.prod.yml if changed)
            git pull origin main
            
            # Free up disk space by removing old docker images and stopped containers
            docker system prune -af
            
            # Pull the new images
            docker compose -f docker-compose.prod.yml pull
            
            # Restart containers with the new images
            docker compose -f docker-compose.prod.yml up -d
            
            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T backend python init_db.py
            
            # Clean up again just in case
            docker image prune -af
