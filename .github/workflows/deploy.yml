name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject Production Environment Variables
        run: |
          echo "VITE_API_URL=/api/v1" > landing/.env.production
          echo "VITE_API_URL=/api/v1" > admin/.env.production
          echo "VITE_API_URL=/api/v1" > super-admin-frontend/.env.production

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push Landing Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/landing-frontend:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

      - name: Build and push Admin Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin-frontend:latest
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Build and push Super Admin Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./super-admin-frontend
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/super-admin-frontend:latest
          cache-from: type=gha,scope=superadmin
          cache-to: type=gha,mode=max,scope=superadmin

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.172.115.154
          username: root
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd /var/www/arko360_platform
            
            # Login to GitHub Container Registry using the GitHub token
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull new code (specifically to get the latest docker-compose.prod.yml if changed)
            git pull origin main
            
            # Free up disk space by removing old docker images and stopped containers
            docker system prune -af
            
            # Pull the new images
            docker compose -f docker-compose.prod.yml pull
            
            # Restart containers with the new images
            docker compose -f docker-compose.prod.yml up -d
            
            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T backend python init_db.py
            
            # Clean up again just in case
            docker image prune -af
