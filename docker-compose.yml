version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: arko_user
      POSTGRES_PASSWORD: arko_password
      POSTGRES_DB: arko360
    volumes:
      - arko_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://arko_user:arko_password@db:5432/arko360
      - SECRET_KEY=changethisinproduction
    depends_on:
      - db

  admin-frontend:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=http://backend:8001/api/v1

  landing-frontend:
    build:
      context: ./landing
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8001/api/v1

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-frontend
      - landing-frontend
      - backend

volumes:
  arko_db_data:
